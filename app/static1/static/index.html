<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Empathy Engine</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="card">

    <header class="card-header">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          <path d="M8 12c0-1.1.4-2.1 1-2.8M16 12c0-1.1-.4-2.1-1-2.8M9 15.5c.8.8 1.9 1.3 3 1.3s2.2-.5 3-1.3"/>
          <circle cx="9" cy="10" r="0.8" fill="currentColor"/>
          <circle cx="15" cy="10" r="0.8" fill="currentColor"/>
        </svg>
      </div>
      <div>
        <h1>Empathy Engine</h1>
        <p class="subtitle">Emotion-aware text to speech</p>
      </div>
    </header>

    <div class="textarea-wrap">
      <textarea id="text" placeholder="Type something with feeling — a poem, a message, a thought…" rows="5"></textarea>
      <span class="char-count" id="charCount">0</span>
    </div>

    <div class="emotion-bar" id="emotionBar">
      <span class="emotion-label">detected tone</span>
      <div class="emotion-chips" id="emotionChips">
        <span class="chip" data-emotion="calm">calm</span>
        <span class="chip" data-emotion="joyful">joyful</span>
        <span class="chip" data-emotion="somber">somber</span>
        <span class="chip" data-emotion="urgent">urgent</span>
        <span class="chip" data-emotion="tender">tender</span>
      </div>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generate()">
      <span class="btn-text">Generate Voice</span>
      <span class="btn-spinner" id="spinner"></span>
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
    </button>

    <div class="waveform-container" id="waveformContainer">
      <div class="waveform" id="waveform">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="audio-wrap" id="audioWrap">
      <audio id="player" controls></audio>
    </div>

  </main>

  <script src="script.js"></script>
  <script>
    // char counter
    const textarea = document.getElementById('text');
    const charCount = document.getElementById('charCount');
    textarea.addEventListener('input', () => {
      charCount.textContent = textarea.value.length;
      detectEmotion(textarea.value);
    });

    // naive client-side emotion hint (visual only, doesn't affect /speak)
    function detectEmotion(text) {
      const t = text.toLowerCase();
      const scores = {
        joyful:  (t.match(/happy|joy|laugh|smile|love|wonderful|great|yay|celebrate/g)||[]).length,
        somber:  (t.match(/sad|cry|loss|miss|alone|dark|grief|pain|hurt|sorrow/g)||[]).length,
        urgent:  (t.match(/now|fast|hurry|quick|stop|help|please|must|need|critical/g)||[]).length,
        tender:  (t.match(/gentle|soft|care|hug|hold|warm|dear|heart|baby|sweet/g)||[]).length,
        calm:    (t.match(/peace|quiet|still|breath|slow|rest|serene|calm|ease/g)||[]).length,
      };
      const max = Math.max(...Object.values(scores));
      document.querySelectorAll('.chip').forEach(chip => {
        chip.classList.remove('active');
        if (max > 0 && scores[chip.dataset.emotion] === max) chip.classList.add('active');
      });
    }

    // patch generate to show loading state & waveform
    const _orig = window.generate;
    window.generate = async function() {
      const btn = document.getElementById('generateBtn');
      const wc  = document.getElementById('waveformContainer');
      const aw  = document.getElementById('audioWrap');
      btn.classList.add('loading');
      wc.classList.add('active');
      aw.classList.remove('visible');
      await _orig();
      btn.classList.remove('loading');
      aw.classList.add('visible');
    };
  </script>
</body>
</html>
